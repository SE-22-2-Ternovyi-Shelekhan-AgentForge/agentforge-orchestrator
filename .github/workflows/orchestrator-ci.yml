name: Orchestrator CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: dotnet
          path: agentforge-orchestrator/src/AgentForge.Orchestrator

  build-and-push-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./agentforge-orchestrator/src/AgentForge.Orchestrator
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agentforge-orchestrator:latest
            ghcr.io/${{ github.repository_owner }}/agentforge-orchestrator:${{ needs.release-please.outputs.tag_name }}